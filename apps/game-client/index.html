<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blodex</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%2318112a'/%3E%3Ctext x='50%25' y='57%25' text-anchor='middle' font-size='38' fill='%23d8b97a' font-family='serif'%3EB%3C/text%3E%3C/svg%3E"
    />
  </head>
  <body>
    <div id="app">
      <div id="game-root">
        <div id="minimap"></div>
      </div>
      <aside id="hud-panel">
        <h1>Blodex</h1>
        <div id="meta"></div>
        <div id="hud-critical">
          <div id="stats"></div>
          <div id="boss-bar" class="hidden"></div>
          <div id="run"></div>
        </div>
        <div id="perf-panel" class="hidden"></div>
        <div id="inventory"></div>
        <div id="log"></div>
        <div id="skillbar" class="hidden"></div>
      </aside>
    </div>
    <div id="scene-transition-overlay" class="hidden"></div>
    <div id="run-summary-overlay" class="hidden"></div>
    <div id="death-overlay" class="hidden"></div>
    <div id="event-panel" class="hidden"></div>
    <div id="meta-menu" class="hidden"></div>
    <div id="language-gate" class="hidden"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
