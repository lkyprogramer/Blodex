assets:
  - id: player_vanguard
    category: player_sprite
    outputName: player_vanguard.png
    prompt: "Isometric hooded knight vanguard with halberd and kite shield, grounded battle-ready stance, full-body game sprite concept"
    subject: "single armored vanguard hero with closed visor helm, halberd, and shield"
    style: "painterly dark fantasy concept art with gritty medieval realism"
    composition: "centered full-body portrait, isolated subject"
    lighting: "dramatic but restrained top-left key light with soft bounce"
    palette: "aged steel grays and tarnished bronze accents"
    materials: "weathered plate armor, worn leather straps, frayed cloth"
